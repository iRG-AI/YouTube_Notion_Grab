<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 배경: 둥근 사각형 -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  
  <!-- YouTube 빨간 원형 배경 -->
  <circle cx="13" cy="14" r="10" fill="#FF0000"/>
  
  <!-- 재생 버튼 (흰색 삼각형) -->
  <polygon points="10,9 10,19 20,14" fill="white"/>
  
  <!-- Notion N (우측 하단) -->
  <rect x="20" y="20" width="11" height="11" rx="2" fill="#ffffff"/>
  <text x="25.5" y="29" font-family="Arial Black,sans-serif" font-size="9" font-weight="900" fill="#1a1a2e" text-anchor="middle">N</text>
  
  <!-- AI 반짝임 (좌측 상단) -->
  <circle cx="5" cy="5" r="3" fill="#0AFFED" opacity="0.9"/>
  <text x="5" y="8.5" font-family="Arial,sans-serif" font-size="5" font-weight="700" fill="#1a1a2e" text-anchor="middle">AI</text>
</svg>